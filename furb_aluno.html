<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FURB Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
html,body{width:100%;height:100%;font-family:'Segoe UI',sans-serif;background:#0D2E6E;overflow:hidden;}
.screen{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;}
.screen.active{display:flex;}
img.logo{height:65px;margin-bottom:16px;}
.card{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:360px;}
h1{font-size:20px;font-weight:900;color:#0D2E6E;margin-bottom:4px;}
.sub{font-size:13px;color:#888;margin-bottom:18px;}
input{width:100%;border:2px solid #e0e6f5;border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;outline:none;margin-bottom:10px;background:#f8faff;}
input:focus{border-color:#1B4FA8;}
.room-in{text-transform:uppercase;letter-spacing:6px;font-weight:900;font-size:22px;text-align:center;}
.btn{width:100%;background:#1B4FA8;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;}
.btn:active{background:#0D2E6E;}
.err{color:#D64444;font-size:13px;text-align:center;margin-top:8px;min-height:18px;}
/* LOBBY */
#s-lobby{color:#fff;text-align:center;}
.big{font-size:60px;margin-bottom:12px;animation:bop 1.8s infinite;}
@keyframes bop{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.lb-t{font-size:22px;font-weight:900;margin-bottom:6px;}
.lb-s{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:16px;}
.badge{background:rgba(255,255,255,.15);border-radius:30px;padding:8px 20px;font-size:14px;font-weight:700;margin-bottom:12px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;}
.chip{background:rgba(255,255,255,.15);border-radius:30px;padding:6px 14px;font-size:13px;font-weight:600;}
.chip.me{background:rgba(240,165,0,.4);border:1px solid #F0A500;}
/* QUESTION */
#s-question{background:#110335;padding:0;justify-content:flex-start;}
.qtop{width:100%;background:#1e0850;padding:14px 18px 10px;flex-shrink:0;}
.tw{height:9px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;margin-bottom:8px;}
.tf{height:100%;background:#F0A500;border-radius:5px;transition:width .1s linear;}
.qm{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.55);font-weight:700;}
.qm span{color:#F0A500;}
.qbody{flex:1;display:flex;align-items:center;justify-content:center;padding:16px;text-align:center;}
.qbody p{font-size:18px;font-weight:700;line-height:1.45;color:#fff;}
.qgrid{display:grid;grid-template-columns:1fr 1fr;flex-shrink:0;}
.qopt{padding:22px 14px;font-size:15px;font-weight:700;color:#fff;display:flex;align-items:center;gap:10px;min-height:80px;cursor:pointer;-webkit-tap-highlight-color:rgba(255,255,255,.3);user-select:none;}
.qopt:active,.qopt:focus{filter:brightness(.75);transform:scale(.97);}
.qopt.c0{background:#E74C3C;} .qopt.c1{background:#3498DB;}
.qopt.c2{background:#F39C12;} .qopt.c3{background:#27AE60;}
.qopt.ok{box-shadow:inset 0 0 0 5px rgba(255,255,255,.9);}
.qopt.no{filter:brightness(.3)!important;}
.sh{width:28px;height:28px;background:rgba(255,255,255,.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
/* FEEDBACK */
#s-feedback{color:#fff;}
.fbcard{background:#fff;border-radius:20px;padding:28px 22px;text-align:center;width:100%;max-width:340px;color:#1a1a2e;}
.fbi{font-size:52px;margin-bottom:10px;}
.fbt{font-size:20px;font-weight:900;margin-bottom:6px;}
.fbex{font-size:13px;color:#666;line-height:1.5;margin-bottom:14px;}
.fbp{font-size:38px;font-weight:900;color:#1B4FA8;line-height:1;}
.fbtot{font-size:13px;color:#999;margin-top:4px;}
.fbwt{font-size:12px;color:#bbb;margin-top:14px;font-style:italic;}
/* DONE */
#s-done{overflow-y:auto;}
.dcard{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:380px;color:#1a1a2e;max-height:85vh;overflow-y:auto;}
.dh{font-size:22px;font-weight:900;color:#0D2E6E;text-align:center;margin-bottom:4px;}
.ds{font-size:13px;color:#888;text-align:center;margin-bottom:14px;}
.myb{background:#E8F0FB;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;}
.myn{font-size:42px;font-weight:900;color:#1B4FA8;line-height:1;}
.myl{font-size:12px;color:#666;margin-top:2px;}
.lbr{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f3fc;}
.lbrk{font-size:18px;font-weight:900;width:26px;text-align:center;color:#1B4FA8;}
.lbn{flex:1;font-weight:700;font-size:14px;}
.lbs{font-weight:800;color:#1B4FA8;font-size:14px;}
</style>
</head>

// ---- REST API HELPERS ----
async function dbGet(path){
  try{const r=await fetch(DB+path+'.json');return r.json();}catch(e){return null;}
}
async function dbSet(path,data){
  try{await fetch(DB+path+'.json',{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});}catch(e){}
}
async function dbPush(path,data){
  try{const r=await fetch(DB+path+'.json',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});const j=await r.json();return j.name;}catch(e){return 'err_'+Date.now();}
}

window.show = function(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// Pre-fill from URL
const urlRoom=new URLSearchParams(window.location.search).get('room');
if(urlRoom) document.getElementById('inp-room').value=urlRoom.toUpperCase();
const savedName=sessionStorage.getItem('fq_name');
if(savedName) document.getElementById('inp-name').value=savedName;

window.joinRoom = async function(){
  const code=document.getElementById('inp-room').value.trim().toUpperCase();
  const name=document.getElementById('inp-name').value.trim();
  const err=document.getElementById('err');
  if(!code||code.length<4){err.textContent='Digite o código da sala';return;}
  if(!name){err.textContent='Digite seu nome';return;}
  err.textContent='Conectando...';
  
  const state=await dbGet('/rooms/'+code+'/state');
  if(!state){err.textContent='Sala não encontrada. Verifique o código.';return;}
  
  roomCode=code;
  sessionStorage.setItem('fq_name',name);
  
  if(!playerId){
    playerId=await dbPush('/rooms/'+roomCode+'/players',{name:name,score:0,joinedAt:Date.now()});
    sessionStorage.setItem('fq_pid',playerId);
  } else {
    await dbSet('/rooms/'+roomCode+'/players/'+playerId,{name:name,score:0,joinedAt:Date.now()});
  }
  
  document.getElementById('lb-title').textContent='Olá, '+name+'! 👋';
  show('s-lobby');
  startPolling();
}

window.startPolling = function(){
  stateInterval=setInterval(async()=>{
    // Poll state
    const state=await dbGet('/rooms/'+roomCode+'/state');
    const stateStr=JSON.stringify(state);
    if(stateStr!==lastStateStr){
      lastStateStr=stateStr;
      if(state) handleState(state);
    }
    // Poll players (for lobby)
    if(document.getElementById('s-lobby').classList.contains('active')){
      const players=await dbGet('/rooms/'+roomCode+'/players');
      const ps=JSON.stringify(players);
      if(ps!==lastPlayersStr){
        lastPlayersStr=ps;
        updatePlayers(players);
      }
    }
  },1500);
}

window.updatePlayers = function(players){
  if(!players)return;
  const list=Object.entries(players);
  document.getElementById('lb-count').textContent='👥 '+list.length+' participante'+(list.length!==1?'s':'');
  const chips=document.getElementById('lb-chips');
  chips.innerHTML='';
  list.forEach(([id,p])=>{
    const c=document.createElement('div');
    c.className='chip'+(id===playerId?' me':'');
    c.textContent=(id===playerId?'👤 ':'')+p.name;
    chips.appendChild(c);
  });
}

window.handleState = function(state){
  clearInterval(timerInt);
  if(state.phase==='lobby') show('s-lobby');
  else if(state.phase==='question') renderQ(state.questionIndex,state.startedAt,state.timeLimitMs||20000);
  else if(state.phase==='reveal') renderFeedback(state.questionIndex);
  else if(state.phase==='done') renderDone();
}

window.renderQ = function(qi,startedAt,limitMs){
  answered=false;
  const q=questions[qi];
  document.getElementById('qnum').textContent='Pergunta '+(qi+1)+'/'+questions.length;
  document.getElementById('qpts').textContent='⭐ '+playerScore.toLocaleString('pt-BR')+' pts';
  document.getElementById('qtext').textContent=q.q;
  const grid=document.getElementById('qgrid');
  grid.innerHTML=q.opts.map((o,i)=>
    '<div class="qopt c'+i+'" id="qo'+i+'" ontouchstart="" onclick="window.answerQ('+qi+','+i+','+startedAt+','+limitMs+')"><span class="sh">'+shapes[i]+'</span>'+o+'</div>'
  ).join('');
  show('s-question');
  // Timer
  const tick=()=>{
    const rem=Math.max(0,limitMs-(Date.now()-startedAt));
    const pct=rem/limitMs*100;
    const f=document.getElementById('tf');
    if(f){f.style.width=pct+'%';f.style.background=pct>50?'#F0A500':pct>25?'#E67E22':'#E74C3C';}
    if(rem<=0){clearInterval(timerInt);if(!answered){answered=true;document.querySelectorAll('.qopt').forEach(b=>b.style.pointerEvents='none');}}
  };
  tick(); timerInt=setInterval(tick,100);
}

window.answerQ = async function(qi,choice,startedAt,limitMs){
  if(answered)return;
  answered=true; clearInterval(timerInt);
  const elapsed=Date.now()-startedAt;
  const ok=choice===questions[qi].correct;
  const pts=ok?Math.max(50,Math.round(1000*(1-elapsed/limitMs))):0;
  // Visual immediately
  document.querySelectorAll('.qopt').forEach((b,i)=>{
    b.style.pointerEvents='none';
    b.classList.add(i===questions[qi].correct?'ok':'no');
  });
  document.getElementById('qpts').textContent=ok?'✅ +'+pts+' pts!':'❌ +0 pts';
  // Save to Firebase
  await dbSet('/rooms/'+roomCode+'/answers/'+qi+'/'+playerId,{choice,respondedAt:Date.now(),points:pts,correct:ok});
  if(ok){playerScore+=pts;await dbSet('/rooms/'+roomCode+'/players/'+playerId+'/score',playerScore);}
}

window.renderFeedback = function(qi){
  dbGet('/rooms/'+roomCode+'/answers/'+qi+'/'+playerId).then(a=>{
    const ok=a&&a.correct; const pts=a?a.points:0;
    document.getElementById('fbi').textContent=ok?'✅':(a?'❌':'⏰');
    document.getElementById('fbt').textContent=ok?'Correto!':(a?'Incorreto':'Tempo esgotado!');
    document.getElementById('fbex').textContent=questions[qi].explain;
    document.getElementById('fbp').textContent='+'+(pts||0).toLocaleString('pt-BR')+' pts';
    document.getElementById('fbtot').textContent='Total: '+playerScore.toLocaleString('pt-BR')+' pontos';
    show('s-feedback');
  });
}

window.renderDone = function(){
  document.getElementById('done-pts').textContent=playerScore.toLocaleString('pt-BR');
  dbGet('/rooms/'+roomCode+'/players').then(players=>{
    if(!players)return;
    const list=Object.entries(players).map(([id,p])=>({id,...p})).sort((a,b)=>(b.score||0)-(a.score||0));
    const lb=document.getElementById('done-lb');
    lb.innerHTML=list.map((p,i)=>`<div class="lbr"><div class="lbrk">${['🥇','🥈','🥉'][i]||i+1}</div><div class="lbn"${p.id===playerId?' style="color:#1B4FA8;font-weight:900"':''}>${p.name}${p.id===playerId?' ★':''}</div><div class="lbs">${(p.score||0).toLocaleString('pt-BR')}</div></div>`).join('');
    show('s-done');
  });
}
</script>
