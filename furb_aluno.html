<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>FURB Quiz</title>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;font-family:'Segoe UI',sans-serif;background:#0D2E6E;overflow:hidden;}
.screen{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s;}
.screen.active{opacity:1;pointer-events:all;}

/* JOIN */
.logo-wrap{margin-bottom:20px;text-align:center;}
.logo-wrap img{height:70px;}
.card{background:#fff;border-radius:20px;padding:28px 22px;width:100%;max-width:360px;color:#1a1a2e;}
.card h1{font-size:20px;font-weight:900;color:#0D2E6E;margin-bottom:3px;}
.card p{font-size:13px;color:#888;margin-bottom:18px;}
.inp{width:100%;border:2px solid #e0e6f5;border-radius:12px;padding:14px 16px;font-size:16px;font-family:inherit;outline:none;margin-bottom:10px;background:#f8faff;}
.inp:focus{border-color:#1B4FA8;background:#fff;}
.room-inp{text-transform:uppercase;letter-spacing:6px;font-weight:900;font-size:22px;text-align:center;}
.btn{width:100%;background:#1B4FA8;color:#fff;border:none;border-radius:12px;padding:16px;font-size:16px;font-weight:800;cursor:pointer;font-family:inherit;transition:background .2s;}
.btn:active{background:#0D2E6E;}
.btn:disabled{background:#aaa;}
.err{color:#D64444;font-size:13px;text-align:center;margin-top:8px;min-height:18px;}

/* LOBBY */
#s-lobby{color:#fff;text-align:center;}
.lb-icon{font-size:60px;margin-bottom:12px;animation:bounce 1.8s infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.lb-title{font-size:22px;font-weight:900;margin-bottom:6px;}
.lb-sub{font-size:14px;color:rgba(255,255,255,.65);margin-bottom:20px;}
.badge{background:rgba(255,255,255,.15);border-radius:30px;padding:8px 20px;font-size:14px;font-weight:700;margin-bottom:14px;}
.chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:320px;}
.chip{background:rgba(255,255,255,.15);border-radius:30px;padding:6px 14px;font-size:13px;font-weight:600;}
.chip.me{background:rgba(240,165,0,.4);border:1px solid #F0A500;}

/* QUESTION */
#s-question{background:#110335;padding:0;justify-content:flex-start;}
.q-top{width:100%;background:#1e0850;padding:14px 18px 10px;flex-shrink:0;}
.timer-wrap{height:9px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;margin-bottom:8px;}
.timer-fill{height:100%;background:#F0A500;border-radius:5px;transition:width .1s linear;}
.q-meta{display:flex;justify-content:space-between;font-size:12px;color:rgba(255,255,255,.55);font-weight:700;}
.q-meta span{color:#F0A500;}
.q-body{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 16px;text-align:center;min-height:100px;}
.q-body p{font-size:18px;font-weight:700;line-height:1.45;color:#fff;}
.q-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;flex-shrink:0;}@media(max-width:480px){.q-grid{grid-template-columns:1fr;}.qb{min-height:70px;}}
.qb{border:none;padding:20px 16px;font-family:inherit;font-size:16px;font-weight:700;color:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;min-height:90px;transition:filter .15s;text-align:left;-webkit-tap-highlight-color:rgba(255,255,255,0.3);touch-action:manipulation;user-select:none;-webkit-user-select:none;pointer-events:all;position:relative;z-index:10;}
.qb:active{filter:brightness(.8);} .qb{touch-action:manipulation;-webkit-tap-highlight-color:rgba(255,255,255,0.3);}
.qb:disabled{cursor:default;}
.qb.c0{background:#E74C3C;} .qb.c1{background:#3498DB;}
.qb.c2{background:#F39C12;} .qb.c3{background:#27AE60;}
.qb .sh{width:26px;height:26px;background:rgba(255,255,255,.25);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;}
.qb.sel-ok{box-shadow:inset 0 0 0 4px rgba(255,255,255,.8);}
.qb.sel-no{filter:brightness(.35)!important;}
.qb.rev-ok{box-shadow:inset 0 0 0 4px rgba(255,255,255,.8);}
.qb.rev-no{filter:brightness(.35)!important;}

/* FEEDBACK */
#s-feedback{color:#fff;}
.fb-card{background:#fff;border-radius:20px;padding:28px 22px;text-align:center;width:100%;max-width:340px;color:#1a1a2e;}
.fb-icon{font-size:52px;margin-bottom:10px;}
.fb-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.fb-explain{font-size:13px;color:#666;line-height:1.5;margin-bottom:14px;}
.fb-pts{font-size:38px;font-weight:900;color:#1B4FA8;line-height:1;}
.fb-total{font-size:13px;color:#999;margin-top:4px;}
.fb-wait{font-size:12px;color:#bbb;margin-top:14px;font-style:italic;}

/* DONE */
#s-done{overflow-y:auto;}
.done-card{background:#fff;border-radius:20px;padding:24px 20px;width:100%;max-width:380px;color:#1a1a2e;max-height:85vh;overflow-y:auto;}
.done-h{font-size:22px;font-weight:900;color:#0D2E6E;text-align:center;margin-bottom:4px;}
.done-sub{font-size:13px;color:#888;text-align:center;margin-bottom:14px;}
.my-box{background:#E8F0FB;border-radius:12px;padding:14px;text-align:center;margin-bottom:14px;}
.my-num{font-size:42px;font-weight:900;color:#1B4FA8;line-height:1;}
.my-lbl{font-size:12px;color:#666;margin-top:2px;}
.lb-row{display:flex;align-items:center;gap:10px;padding:9px 0;border-bottom:1px solid #f0f3fc;}
.lb-rank{font-size:18px;font-weight:900;width:26px;text-align:center;color:#1B4FA8;}
.lb-nm{flex:1;font-weight:700;font-size:14px;}
.lb-sc{font-weight:800;color:#1B4FA8;font-size:14px;}
</style>
</head>

  {q:"Qual é o prazo máximo do plano de pagamento no processo judicial de superendividamento?",opts:["2 anos","10 anos","5 anos","3 anos"],correct:2,explain:"Art. 104-A: o consumidor apresenta plano com prazo máximo de 5 anos, preservando o mínimo existencial."},
  {q:"Sua família está superendividada. Qual é o PRIMEIRO passo recomendado?",opts:["Contratar um advogado particular","Ignorar e aguardar prescrever","Procurar o PROCON — é gratuito","Pagar primeiro a dívida maior"],correct:2,explain:"O PROCON conduz conciliação administrativa gratuita (Art. 104-C), sem necessidade de advogado."},
  {q:"O que é o CET (Custo Efetivo Total)?",opts:["O total das parcelas sem juros","Taxa percentual anual com todos os encargos cobrados","O valor do produto à vista","A taxa de juros mensal apenas"],correct:1,explain:"Art. 54-B, §2º: o CET é taxa percentual anual que compreende todos os valores cobrados do consumidor."},
  {q:"Um credor não comparece à audiência de conciliação. O que acontece?",opts:["Nada — o processo é suspenso","O consumidor perde o direito ao plano","A exigibilidade do débito é automaticamente suspensa","O credor recebe multa apenas"],correct:2,explain:"Art. 104-A, §2º: ausência injustificada acarreta suspensão da exigibilidade do débito e interrupção dos encargos de mora."},
  {q:"Você tem R$ 1.500 disponíveis e quer um eletrônico de R$ 1.500. O mais inteligente é:",opts:["Parcelar em 12x e guardar o dinheiro","Usar cartão para acumular pontos","Pagar à vista — sem juros e com possível desconto","Esperar a Black Friday parcelada"],correct:2,explain:"Pagar à vista elimina juros, evita risco de parcelas futuras e garante 5–15% de desconto."},
  {q:"A Lei 14.181/2021 protege dívidas de quem agiu com má-fé ou fraude?",opts:["Sim, todos são protegidos igualmente","Não — a lei exige boa-fé do consumidor","Só se for a primeira dívida","Depende do valor da dívida"],correct:1,explain:"Art. 54-A, §3º: a lei NÃO se aplica ao consumidor cujas dívidas foram contraídas mediante fraude ou má-fé."},
  {q:"Qual é a regra de distribuição de renda mais recomendada para quem está no primeiro emprego?",opts:["70% necessidades / 30% lazer","50% necessidades / 30% desejos / 20% poupança","60% necessidades / 40% lazer","40% poupança / 60% gastos"],correct:1,explain:"A regra 50/30/20: 50% necessidades, 30% desejos e 20% poupança — recomendada para construir saúde financeira."},
  {q:"O Art. 54-C proíbe que o credor faça qual dessas práticas?",opts:["Cobrar juros sobre o principal","Assediar ou pressionar consumidores idosos a contratar crédito","Recusar crédito sem justificativa","Parcelar produtos em mais de 12x"],correct:1,explain:"Art. 54-C, IV: vedado assediar ou pressionar o consumidor, principalmente idosos, doentes ou em estado de vulnerabilidade."},
  {q:"Qual desses financiamentos está EXCLUÍDO do processo de repactuação de superendividamento?",opts:["Cartão de crédito","Empréstimo pessoal","Financiamento imobiliário","Cheque especial"],correct:2,explain:"Art. 104-A, §1º: excluem-se contratos com garantia real, financiamentos imobiliários e crédito rural."}
];

// Pre-fill room code from URL
const urlRoom = new URLSearchParams(window.location.search).get('room');
if (urlRoom) document.getElementById('inp-room').value = urlRoom.toUpperCase();
const savedName = sessionStorage.getItem('fq_name');
if (savedName) document.getElementById('inp-name').value = savedName;

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

async function joinRoom(){
  const code = document.getElementById('inp-room').value.trim().toUpperCase();
  const name = document.getElementById('inp-name').value.trim();
  const err  = document.getElementById('err');
  const btn  = document.getElementById('btn-join');
  if(!code||code.length<4){err.textContent='Digite o código da sala';return;}
  if(!name){err.textContent='Digite seu nome';return;}
  btn.disabled=true; err.textContent='Conectando...';

  const snap = await db.ref('rooms/'+code+'/state').get();
  if(!snap.exists()){err.textContent='Sala não encontrada. Verifique o código.';btn.disabled=false;return;}

  roomCode=code;
  sessionStorage.setItem('fq_name',name);

  if(!playerId){
    const ref = db.ref('rooms/'+roomCode+'/players').push();
    playerId = ref.key;
    sessionStorage.setItem('fq_pid',playerId);
    await ref.set({name:name,score:0,joinedAt:firebase.database.ServerValue.TIMESTAMP});
  } else {
    await db.ref('rooms/'+roomCode+'/players/'+playerId).update({name:name,online:true});
  }

  document.getElementById('lb-title').textContent = 'Olá, '+name+'! 👋';
  show('s-lobby');
  listenRoom();
}

function listenRoom(){
  db.ref('rooms/'+roomCode+'/players').on('value', snap=>{
    const pl = snap.val()||{};
    const n = Object.keys(pl).length;
    document.getElementById('lb-count').textContent = '👥 '+n+' participante'+(n!==1?'s':'');
    const chips = document.getElementById('lb-chips');
    chips.innerHTML='';
    Object.entries(pl).forEach(([id,p])=>{
      const c=document.createElement('div');
      c.className='chip'+(id===playerId?' me':'');
      c.textContent=(id===playerId?'👤 ':'')+p.name;
      chips.appendChild(c);
    });
  });

  db.ref('rooms/'+roomCode+'/state').on('value', snap=>{
    const st=snap.val();
    if(!st)return;
    clearInterval(timerInt);
    if(st.phase==='lobby') show('s-lobby');
    else if(st.phase==='question') renderQuestion(st.questionIndex, st.startedAt, st.timeLimitMs||20000);
    else if(st.phase==='reveal')   renderFeedback(st.questionIndex);
    else if(st.phase==='done')     renderDone();
  });
}

function renderQuestion(qi, startedAt, limitMs){
  answered=false;
  const q=questions[qi];
  document.getElementById('q-num').textContent='Pergunta '+(qi+1)+'/'+questions.length;
  document.getElementById('q-pts-live').textContent='⭐ '+playerScore.toLocaleString('pt-BR')+' pts';
  document.getElementById('q-text').textContent=q.q;
  const grid=document.getElementById('q-grid');
  grid.innerHTML='';
  q.opts.forEach((o,i)=>{
    const b=document.createElement('button');
    b.className='qb c'+i; b.id='qb'+i;
    b.innerHTML='<span class="sh">'+shapes[i]+'</span>'+o;
    // Use both click and touchend for maximum mobile compatibility
    const handler=(e)=>{
      e.preventDefault();
      e.stopPropagation();
      submitAns(qi,i,startedAt,limitMs);
    };
    b.addEventListener('click', handler);
    b.addEventListener('touchend', handler, {passive:false});
    grid.appendChild(b);
  });
  show('s-question');
  const tick=()=>{
    const rem=Math.max(0,limitMs-(Date.now()-startedAt));
    const fill=document.getElementById('timer-fill');
    if(fill){
      const pct=(rem/limitMs)*100;
      fill.style.width=pct+'%';
      fill.style.background=pct>50?'#F0A500':pct>25?'#E67E22':'#E74C3C';
    }
    if(rem<=0){clearInterval(timerInt);if(!answered){answered=true;document.querySelectorAll('.qb').forEach(b=>b.disabled=true);}}
  };
  tick(); timerInt=setInterval(tick,100);
}

async function submitAns(qi,choice,startedAt,limitMs){
  if(answered)return;
  answered=true; clearInterval(timerInt);
  
  // Feedback visual IMEDIATO no toque
  document.querySelectorAll('.qb').forEach((b,i)=>{
    b.disabled=true;
    if(i===choice) b.style.opacity='0.7';
  });
  document.getElementById('q-pts-live').textContent='⏳ Salvando...';

  const elapsed=Date.now()-startedAt;
  const ok=choice===questions[qi].correct;
  const pts=ok?Math.max(50,Math.round(1000*(1-elapsed/limitMs))):0;
  
  try {
    await db.ref('rooms/'+roomCode+'/answers/'+qi+'/'+playerId).set({choice,respondedAt:Date.now(),points:pts,correct:ok});
    if(ok){playerScore+=pts;await db.ref('rooms/'+roomCode+'/players/'+playerId+'/score').set(playerScore);}
    document.getElementById('q-pts-live').textContent='✅ Respondido! ⭐'+playerScore.toLocaleString('pt-BR')+'pts';
  } catch(e) {
    document.getElementById('q-pts-live').textContent='⚠️ Erro ao salvar — verifique as Regras do Firebase';
    console.error('Firebase write error:', e);
  }

  document.querySelectorAll('.qb').forEach((b,i)=>{
    b.style.opacity='';
    if(i===choice) b.style.boxShadow='inset 0 0 0 4px rgba(255,255,255,0.9)';
    else b.style.filter='brightness(0.4)';
  });
}

function renderFeedback(qi){
  db.ref('rooms/'+roomCode+'/answers/'+qi+'/'+playerId).get().then(snap=>{
    const a=snap.val();
    const ok=a&&a.correct; const pts=a?a.points:0;
    document.getElementById('fb-icon').textContent=ok?'✅':(a?'❌':'⏰');
    document.getElementById('fb-title').textContent=ok?'Correto!':(a?'Incorreto':'Tempo esgotado!');
    document.getElementById('fb-explain').textContent=questions[qi].explain;
    document.getElementById('fb-pts').textContent='+'+(pts||0).toLocaleString('pt-BR')+' pts';
    document.getElementById('fb-total').textContent='Total: '+playerScore.toLocaleString('pt-BR')+' pontos';
    show('s-feedback');
  });
}

function renderDone(){
  document.getElementById('done-pts').textContent=playerScore.toLocaleString('pt-BR');
  db.ref('rooms/'+roomCode+'/players').get().then(snap=>{
    const pl=[];
    snap.forEach(c=>pl.push({id:c.key,...c.val()}));
    pl.sort((a,b)=>(b.score||0)-(a.score||0));
    const lb=document.getElementById('done-lb');
    lb.innerHTML='';
    pl.forEach((p,i)=>{
      const icons=['🥇','🥈','🥉'];
      const d=document.createElement('div');
      d.className='lb-row';
      d.innerHTML='<div class="lb-rank">'+(icons[i]||i+1)+'</div>'
        +'<div class="lb-nm"'+(p.id===playerId?' style="color:#1B4FA8;font-weight:900"':'')+'>'+p.name+(p.id===playerId?' ★':'')+' </div>'
        +'<div class="lb-sc">'+((p.score||0).toLocaleString('pt-BR'))+'</div>';
      lb.appendChild(d);
    });
    show('s-done');
  });
}
</script>
